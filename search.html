<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Search | Omniverse</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: url(assets/images/searchbg.jpeg);
        background-position: auto;
        background-size: cover;
        background-attachment: fixed;
      }
      .search-container {
        position: relative;
        max-width: 400px;
        margin: auto;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      .search-results {
        position: absolute;
        width: 100%;
        background: linear-gradient(to right, #fff, #454545);
        border: 1px solid #ccc;
        display: none;
        border-radius: 5px;
        max-height: 200px;
        overflow-y: auto;
        color: black;
      }
      .search-results div {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
      }
      .search-results div:hover {
        background: #040000;
        color: #fff2ff;
      }
      a {
        text-decoration: none;
      }
      button {
        --bezier: cubic-bezier(0.22, 0.61, 0.36, 1);
        --edge-light: hsla(0, 0%, 50%, 0.8);
        --text-light: rgba(255, 255, 255, 0.4);
        --back-color: 240, 40%;

        cursor: pointer;
        padding: 0.7em 2em;
        border-radius: 0.5em;
        min-height: 2.4em;
        min-width: 3em;
        display: flex;
        align-items: center;
        gap: 0.5em;

        font-size: 18px;
        letter-spacing: 0.05em;
        line-height: 1;
        font-weight: bold;

        background: linear-gradient(
          140deg,
          hsla(var(--back-color), 50%, 1) min(2em, 20%),
          hsla(var(--back-color), 50%, 0.6) min(8em, 100%)
        );
        color: hsla(0, 0%, 90%);
        border: 0;
        box-shadow: inset 0.4px 1px 4px var(--edge-light);

        transition: all 0.1s var(--bezier);
      }

      button:hover {
        --edge-light: hsla(0, 0%, 50%, 1);
        text-shadow: 0px 0px 10px var(--text-light);
        box-shadow: inset 0.4px 1px 4px var(--edge-light),
          2px 4px 8px hsla(0, 0%, 0%, 0.295);
        transform: scale(1.1);
      }

      button:active {
        --text-light: rgba(255, 255, 255, 1);

        background: linear-gradient(
          140deg,
          hsla(var(--back-color), 50%, 1) min(2em, 20%),
          hsla(var(--back-color), 50%, 0.6) min(8em, 100%)
        );
        box-shadow: inset 0.4px 1px 8px var(--edge-light),
          0px 0px 8px hsla(var(--back-color), 50%, 0.6);
        text-shadow: 0px 0px 20px var(--text-light);
        color: hsla(0, 0%, 100%, 1);
        letter-spacing: 0.1em;
        transform: scale(1);
      }
    </style>
  </head>
  <body>
    <a href="index.html">
      <button>Back</button>
    </a>
    <h1>Search for an Anime</h1>
    <div class="search-container">
      <input type="text" id="searchBox" placeholder="Search for an anime..." />
      <div id="searchResults" class="search-results"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
